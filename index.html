<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Frota - Dashboard Multi-Select</title>
    <meta name="description" content="Dashboard de gerenciamento de frota veicular com login seguro e filtros múltiplos.">
    
    <!-- Favicon (Ícone de Ônibus) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚌</text></svg>">

    <!-- 1. Tailwind CSS (Estilos) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. React e ReactDOM --> 
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Prop-Types (Dependência do Recharts) -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>

    <!-- 4. Recharts (Gráficos) -->
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>

    <!-- 5. Babel (Compilador para JSX no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 6. FIREBASE SDK (Compatibilidade + AUTH + FIRESTORE) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-backdrop { animation: fadeIn 0.2s ease-out; }
        .recharts-sector, .recharts-rectangle { cursor: pointer; }
        /* Custom Scrollbar para Dropdowns */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURAÇÃO DO FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBHJUaEgNk84LuUURMMwuzYn4n29eiW0DI", 
            authDomain: "frota-sightseeing.firebaseapp.com",
            projectId: "frota-sightseeing",
            storageBucket: "frota-sightseeing.firebasestorage.app",
            messagingSenderId: "795209583853",
            appId: "1:795209583853:web:1335b32261f4cbadfb10e4",
            measurementId: "G-WX61GMSBBC"
        };

        const isConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "SUA_API_KEY_AQUI";
        const COLLECTION_NAME = "frota_veiculos_v2_premium";

        let db = null;
        let auth = null;

        if (isConfigured && typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                auth = firebase.auth(); 
            } catch (err) {
                console.error("Erro na inicialização do Firebase:", err);
            }
        }

        // --- CONFIGURAÇÃO INICIAL REACT ---
        const { useState, useMemo, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, LabelList } = Recharts;

        // --- ÍCONES ---
        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        // Ícones Específicos
        const Bus = (props) => <IconBase {...props}><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.34-.02-.68-.05-1.02l-1.58-13c-.1-.8-.8-1.4-1.6-1.4H4.7c-.8 0-1.5.6-1.6 1.4l-1.58 13c-.03.34-.05.68-.05 1.02 0 .4.1.8.2 1.2.3 1.1.8 2.8.8 2.8h3"/><path d="M6.6 22h10.8"/><circle cx="5.8" cy="18" r="1.8"/><circle cx="17.8" cy="18" r="1.8"/></IconBase>;
        const Activity = (props) => <IconBase {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></IconBase>;
        const CreditCard = (props) => <IconBase {...props}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></IconBase>;
        const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
        const Wrench = (props) => <IconBase {...props}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></IconBase>;
        const Hammer = (props) => <IconBase {...props}><path d="m15 12-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L12 9"/><path d="M17.64 15 22 10.64"/><path d="m20.91 11.7-1.25-1.25c-.6-.6-.93-1.4-.93-2.25V7c0-.55-.45-1-1-1H16.5c-.55 0-1 .45-1 1v1.2c0 .85-.33 1.65-.93 2.25L13.36 11.7"/><path d="m16 5-5-3-4 2 1.8 1.8"/></IconBase>;
        const ArrowUpDown = (props) => <IconBase {...props}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></IconBase>;
        const ArrowUp = (props) => <IconBase {...props}><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></IconBase>;
        const ArrowDown = (props) => <IconBase {...props}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></IconBase>;
        const XIcon = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 18 18"/></IconBase>;
        const Calendar = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const ListIcon = (props) => <IconBase {...props}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const ArrowLeft = (props) => <IconBase {...props}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></IconBase>;
        const Edit = (props) => <IconBase {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconBase>;
        const Save = (props) => <IconBase {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>;
        const FilterIcon = (props) => <IconBase {...props}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>;
        const DollarSign = (props) => <IconBase {...props}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconBase>;
        const MapPin = (props) => <IconBase {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const TypeIcon = (props) => <IconBase {...props}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></IconBase>;
        const ShoppingCart = (props) => <IconBase {...props}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></IconBase>;
        const RotateCcw = (props) => <IconBase {...props}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></IconBase>;
        const AlertTriangle = (props) => <IconBase {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>;
        const Key = (props) => <IconBase {...props}><path d="m21 2-2 2m-7.6 7.6a6 6 0 1 1-5.36-4.5 3.8 3.8 0 0 1 1.1 3 2.8 2.8 0 0 1 2.22 1.5L12 15l2-2V9.5a2.5 2.5 0 0 1 2.5-2.5h2"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconBase>;
        const LogOut = (props) => <IconBase {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></IconBase>;
        const Lock = (props) => <IconBase {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconBase>;
        const ChevronDown = (props) => <IconBase {...props}><path d="m6 9 6 6 6-6"/></IconBase>;
        const Check = (props) => <IconBase {...props}><polyline points="20 6 9 17 4 12"/></IconBase>;
        const SettingsIcon = (props) => <IconBase {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></IconBase>;
        const Trash = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></IconBase>;
        const Wallet = (props) => <IconBase {...props}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></IconBase>;

        // --- DADOS E VARIÁVEIS ---
        
        const STATUS_MAP = {
            'P': 'Palmas',
            'ETBL': 'Braso Lisboa',
            'RTP': 'Recreio',
            'A': 'Alugado',
            'R': 'Rio'
        };

        const COLORS = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884d8', '#82ca9d', '#8884d8', '#82ca9d'];

        // --- FUNÇÕES DE LÓGICA ---

        const normalizeText = (text) => {
            if (!text) return '';
            return text.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
        };

        const getStatusCategory = (situacaoRaw) => {
            const s = normalizeText(situacaoRaw);
            if (s.includes('VENDIDO')) return 'VENDIDO';
            if (s.includes('OPERACAO') || s.includes('RODANDO')) return 'OPERACAO';
            if (s.includes('REFORMA') || s.includes('FUNILARIA') || s.includes('PINTURA')) return 'REFORMA';
            if (s.includes('MANUT') || s.includes('OFICINA') || s.includes('REVISAO') || s.includes('MECANICA') || s.includes('CORRETIVA') || s.includes('PREVENTIVA') || s.includes('PARADO') || s.includes('GARAGEM') || s.includes('AVARIA') || s.includes('BRASO')) return 'MANUTENCAO';
            if (s.includes('LIBERADO') || s.includes('DISPONIVEL') || s.includes('PRONTO')) return 'LIBERADO';
            return 'OUTROS';
        };

        const findKey = (sampleItem, variations) => {
            if (!sampleItem) return null;
            const keys = Object.keys(sampleItem);
            for (const v of variations) { if (keys.includes(v)) return v; }
            for (const v of variations) { const found = keys.find(k => normalizeText(k).includes(normalizeText(v))); if (found) return found; }
            return null;
        };

        const formatCurrency = (value) => {
            if (value === null || value === undefined) return '';
            const num = parseFloat(value);
            if (isNaN(num)) return value;
            return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        // --- COMPONENTES ---
        const SettingsModal = ({ initialOptions, onClose, onSave }) => {
            const [localSettings, setLocalSettings] = useState({
                status: initialOptions.status || [],
                situacao: initialOptions.situacao || [],
                banco: initialOptions.banco || []
            });

            const [trackedEdits, setTrackedEdits] = useState([]);
            const [trackedDeletes, setTrackedDeletes] = useState([]);
            const [modalState, setModalState] = useState({ isOpen: false, type: '', action: '', oldValue: '', value: '' });

            const handleOpenModal = (type, action, oldValue = '') => setModalState({ isOpen: true, type, action, oldValue, value: oldValue });
            const handleCloseModal = () => setModalState({ ...modalState, isOpen: false });

            const handleConfirmModal = () => {
                const { type, action, oldValue, value } = modalState;
                const cleanVal = value.trim().toUpperCase();
                if (!cleanVal) return;

                setLocalSettings(prev => {
                    const currentList = prev[type];
                    if (action === 'add') {
                        if (!currentList.includes(cleanVal)) {
                            return { ...prev, [type]: [...currentList, cleanVal].sort() };
                        }
                    } else if (action === 'edit' && oldValue !== cleanVal) {
                        setTrackedEdits(prevEdits => [...prevEdits, { type, old: oldValue, new: cleanVal }]);
                        return { ...prev, [type]: currentList.map(item => item === oldValue ? cleanVal : item).sort() };
                    }
                    return prev;
                });
                handleCloseModal();
            };

            const handleRemove = (type, val) => {
                if(confirm(`Tem certeza que deseja excluir a opção "${val}"?\n\nIsso removerá a opção das listas. Se essa opção existir em veículos cadastrados, ela também será apagada deles (ficando em branco).`)) {
                    setTrackedDeletes(prev => [...prev, { type, val }]);
                    setLocalSettings(prev => ({ ...prev, [type]: prev[type].filter(i => i !== val) }));
                }
            };

            const Section = ({ title, type }) => (
                <div className="mb-6">
                    <div className="flex justify-between items-center mb-3">
                        <h4 className="text-sm font-semibold text-slate-700">{title}</h4>
                        <button onClick={() => handleOpenModal(type, 'add')} className="flex items-center gap-1 text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors font-medium border border-blue-100 shadow-sm">
                            <Plus className="w-3.5 h-3.5" /> Adicionar
                        </button>
                    </div>
                    <div className="flex flex-col gap-2 max-h-48 overflow-y-auto custom-scrollbar p-2 border border-slate-200 rounded-xl bg-slate-50/50 shadow-inner">
                        {localSettings[type].map(item => (
                            <div key={item} className="flex items-center justify-between bg-white border border-slate-200 shadow-sm px-3 py-2.5 rounded-lg text-sm font-medium text-slate-700 group hover:border-blue-300 transition-colors">
                                <span className="truncate pr-4">{item}</span>
                                <div className="flex items-center gap-1">
                                    <button onClick={() => handleOpenModal(type, 'edit', item)} className="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="Editar Nome">
                                        <Edit className="w-4 h-4" />
                                    </button>
                                    <button onClick={() => handleRemove(type, item)} className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors" title="Excluir Opção">
                                        <Trash className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>
                        ))}
                        {localSettings[type].length === 0 && <div className="text-xs text-slate-400 italic p-3 text-center bg-white rounded-lg border border-dashed border-slate-200">Nenhum item cadastrado.</div>}
                    </div>
                </div>
            );

            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 modal-backdrop backdrop-blur-sm p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] animate-in zoom-in-95 duration-200">
                        <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                            <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><SettingsIcon className="w-5 h-5 text-slate-600" /> Configurar Filtros</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition-colors"><XIcon className="w-5 h-5" /></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar bg-white">
                            <div className="mb-6 p-3 bg-amber-50 border border-amber-200 rounded-lg flex gap-3 text-sm text-amber-800">
                                <AlertTriangle className="w-5 h-5 flex-shrink-0 mt-0.5 text-amber-600" />
                                <div>
                                    <strong className="block mb-1">Atenção ao Editar/Excluir</strong>
                                    Alterar o nome ou excluir opções afetará <b>todos os veículos</b> que as utilizam atualmente, atualizando a base de dados automaticamente.
                                </div>
                            </div>
                            <Section title="Opções de Status" type="status" />
                            <Section title="Opções de Situação" type="situacao" />
                            <Section title="Opções de Banco" type="banco" />
                        </div>
                        <div className="px-6 py-4 bg-slate-50 flex justify-end gap-3 border-t border-slate-100">
                            <button onClick={onClose} className="px-4 py-2.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 shadow-sm">Cancelar</button>
                            <button onClick={() => onSave(localSettings, trackedEdits, trackedDeletes)} className="px-4 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg flex items-center gap-2 hover:bg-blue-700 shadow-sm"><Save className="w-4 h-4" /> Salvar Alterações</button>
                        </div>
                    </div>

                    {modalState.isOpen && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 animate-in fade-in duration-150">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95 duration-200">
                                <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h4 className="font-bold text-slate-800 flex items-center gap-2">
                                        {modalState.action === 'add' ? <Plus className="w-4 h-4 text-blue-600" /> : <Edit className="w-4 h-4 text-blue-600" />}
                                        {modalState.action === 'add' ? `Adicionar ${modalState.type === 'situacao' ? 'Situação' : modalState.type}` : 'Editar Opção'}
                                    </h4>
                                    <button onClick={handleCloseModal} className="text-slate-400 hover:text-slate-600"><XIcon className="w-4 h-4" /></button>
                                </div>
                                <div className="p-5">
                                    <label className="block text-sm font-medium text-slate-700 mb-2">Nome da Opção</label>
                                    <input 
                                        type="text" 
                                        autoFocus
                                        className="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-500 uppercase shadow-sm"
                                        value={modalState.value}
                                        onChange={e => setModalState({...modalState, value: e.target.value})}
                                        onKeyDown={e => e.key === 'Enter' && handleConfirmModal()}
                                        placeholder="Digite o nome..."
                                    />
                                </div>
                                <div className="px-5 py-4 bg-slate-50 flex justify-end gap-2 border-t border-slate-100">
                                    <button onClick={handleCloseModal} className="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg shadow-sm">Cancelar</button>
                                    <button onClick={handleConfirmModal} className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg shadow-sm hover:bg-blue-700">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const MultiSelectDropdown = ({ label, options, selectedValues, onChange, mapLabel }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = React.useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            // Novos States para Auth
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginError, setLoginError] = useState('');

            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            const [filters, setFilters] = useState({ status: [], situacao: [], banco: [], category: '', ano: '' });
            const [editingVehicle, setEditingVehicle] = useState(null);
            const [sellingVehicle, setSellingVehicle] = useState(null);
            const [updatingPayment, setUpdatingPayment] = useState(null);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [filterSettings, setFilterSettings] = useState({ status: [], situacao: [], banco: [] });

            // 1. Monitorar Status de Autenticação (Real)
            useEffect(() => {
                if (!auth) { setAuthLoading(false); return; }
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setAuthLoading(false);
                    if (!u) {
                        setFleetData([]); // Limpa dados ao sair
                    }
                });
                return unsubscribe;
            }, []);

            // 2. Carregar Dados SOMENTE se logado
            useEffect(() => {
                if (!user || !db) return;

                setIsLoading(true);
                const unsubscribe = db.collection(COLLECTION_NAME).onSnapshot((snapshot) => {
                    const vehicles = [];
                    let loadedSettings = { status: [], situacao: [], banco: [] };

                    snapshot.docs.forEach(doc => {
                        if (doc.id === '_SETTINGS_FILTERS_') {
                            loadedSettings = {
                                status: doc.data().status || [],
                                situacao: doc.data().situacao || [],
                                banco: doc.data().banco || []
                            };
                        } else {
                            vehicles.push({ firestoreId: doc.id, ...doc.data() });
                        }
                    });

                    setFilterSettings(loadedSettings);
                    setFirebaseError(null);
                    setFleetData(vehicles);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Erro Firestore:", error);
                    let msg = `Erro de Conexão: ${error.message}`;
                    if (error.code === 'permission-denied') msg = "Permissão Negada: Utilizador sem acesso.";
                    setFirebaseError(msg);
                    setIsLoading(false);
                });

                return unsubscribe;
            }, [user]); // Depende do usuário estar logado

            // Ações de Auth
            const handleLogin = async (email, password) => {
                setLoginError('');
                setAuthLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    let msg = "Erro ao iniciar sessão. Verifique as suas credenciais.";
                    
                    if (err.code === 'auth/invalid-email') {
                        msg = "O formato do e-mail é inválido.";
                    } else if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                        msg = "E-mail ou palavra-passe incorretos.";
                    } else if (err.code === 'auth/too-many-requests') {
                        msg = "Muitas tentativas falhadas. Tente novamente mais tarde.";
                    } else {
                        msg = `Falha na autenticação: ${err.message}`;
                    }

                    setLoginError(msg);
                    setAuthLoading(false);
                }
            };

            const handleRegister = async (email, password) => {
                setLoginError('');
                setAuthLoading(true);
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                } catch (err) {
                    let msg = "Erro ao registar conta.";
                    if (err.code === 'auth/email-already-in-use') {
                        msg = "Este e-mail já está em uso.";
                    } else if (err.code === 'auth/invalid-email') {
                        msg = "O formato do e-mail é inválido.";
                    } else if (err.code === 'auth/weak-password') {
                        msg = "A palavra-passe deve ter pelo menos 6 caracteres.";
                    } else {
                        msg = `Falha ao registar: ${err.message}`;
                    }
                    
                    setLoginError(msg);
                    setAuthLoading(false);
                }
            };

            const handleLogout = async () => {
                try {
                    await auth.signOut();
                } catch (e) {
                    console.error("Erro ao sair", e);
                }
            };

            // Helpers de Dados
            const keys = useMemo(() => {
                const sample = fleetData[0] || {};
                return {
                    ANO: findKey(sample, ['ANO/MOD', 'ANO', 'ANO FAB', 'FABRICAÇÃO']) || 'ANO',
                    SITUACAO: findKey(sample, ['SITUAÇÃO', 'SITUACAO', 'SIT', 'ESTADO', 'CONDIÇÃO']) || 'SITUAÇÃO',
                    STATUS: findKey(sample, ['STATUS', 'ESTADO']) || 'Status',
                    BANCO: findKey(sample, ['BANCO', 'FINANCIADOR']) || 'BANCO',
                    PLACA: findKey(sample, ['PLACA', 'LICENSE']) || 'PLACA',
                    PREFIXO: findKey(sample, ['PREFIXO', 'NUMERO']) || 'PREFIXO',
                    MODELO: findKey(sample, ['CARROCERIA', 'MODELO']) || 'CARROCERIA',
                    CHASSI: findKey(sample, ['MOD. CHASSI', 'CHASSI']) || 'MOD. CHASSI',
                    FORNECEDORA: findKey(sample, ['FORNECEDORA', 'FORNECEDORA', 'ORIGEM', 'FORN']) || 'FORNECEDORA',
                    RENAVAM: findKey(sample, ['RENAVAM', 'REN']) || 'RENAVAM',
                    NOVO_PREFIXO: 'NOVO_PREFIXO',
                    IS_SOLD: 'isSold',
                    BUYER: 'comprador',
                    PRICE: 'valor_venda',
                    RECEIVED_AMOUNT: 'valor_recebido',
                    SALE_DATE: 'data_venda'
                };
            }, [fleetData]);

            // Ações de Escrita
            const handleSaveEdit = async (newSituacao, newStatus, newNovoPrefixo, newBanco) => {
                if (!editingVehicle || !user) return;
                try {
                    await db.collection(COLLECTION_NAME).doc(editingVehicle.firestoreId).update({
                        [keys.SITUACAO]: newSituacao,
                        [keys.STATUS]: newStatus,
                        [keys.NOVO_PREFIXO]: newNovoPrefixo,
                        [keys.BANCO]: newBanco
                    });
                    setEditingVehicle(null);
                } catch (e) { alert("Erro ao salvar: " + e.message); }
            };

            const handleConfirmSale = async (vehicle, buyer, price, receivedAmount) => {
                if (!user) return;
                try {
                    await db.collection(COLLECTION_NAME).doc(vehicle.firestoreId).update({
                        [keys.IS_SOLD]: true,
                        [keys.SITUACAO]: 'VENDIDO',
                        [keys.BUYER]: buyer,
                        [keys.PRICE]: parseFloat(price),
                        [keys.RECEIVED_AMOUNT]: parseFloat(receivedAmount) || 0,
                        [keys.SALE_DATE]: new Date().toLocaleDateString('pt-BR')
                    });
                    setSellingVehicle(null);
                } catch (e) { alert("Erro ao vender: " + e.message); }
            };
            
            const handleUpdatePayment = async (vehicle, receivedAmount) => {
                if (!user) return;
                try {
                    await db.collection(COLLECTION_NAME).doc(vehicle.firestoreId).update({
                        [keys.RECEIVED_AMOUNT]: parseFloat(receivedAmount) || 0
                    });
                    setUpdatingPayment(null);
                } catch (e) { alert("Erro ao atualizar pagamento: " + e.message); }
            };

            const handleCancelSale = async (vehicle) => {
                if (!user) return;
                if(confirm(`Cancelar venda do veículo ${vehicle[keys.PREFIXO]}?`)) {
                    try {
                        await db.collection(COLLECTION_NAME).doc(vehicle.firestoreId).update({
                            [keys.IS_SOLD]: false,
                            [keys.SITUACAO]: 'DISPONIVEL',
                            [keys.BUYER]: null,
                            [keys.PRICE]: null,
                            [keys.RECEIVED_AMOUNT]: null,
                            [keys.SALE_DATE]: null
                        });
                    } catch (e) { alert("Erro ao cancelar: " + e.message); }
                }
            };

            const handleSaveSettings = async (newSettings, edits = [], deletes = []) => {
                if (!user) return;
                try {
                    // Salva a nova lista de opções no documento '_SETTINGS_FILTERS_'
                    await db.collection(COLLECTION_NAME).doc('_SETTINGS_FILTERS_').set(newSettings, { merge: true });
                    
                    // Se houveram edições ou exclusões, aplicar em todos os veículos correspondentes
                    if (edits.length > 0 || deletes.length > 0) {
                        let batch = db.batch();
                        let count = 0;

                        fleetData.forEach(vehicle => {
                            if (vehicle.firestoreId === '_SETTINGS_FILTERS_') return;
                            
                            let needsUpdate = false;
                            let updateData = {};

                            edits.forEach(edit => {
                                const dbKey = edit.type === 'banco' ? keys.BANCO : edit.type === 'situacao' ? keys.SITUACAO : keys.STATUS;
                                if (vehicle[dbKey] === edit.old) {
                                    updateData[dbKey] = edit.new;
                                    needsUpdate = true;
                                }
                            });

                            deletes.forEach(del => {
                                const dbKey = del.type === 'banco' ? keys.BANCO : del.type === 'situacao' ? keys.SITUACAO : keys.STATUS;
                                if (vehicle[dbKey] === del.val) {
                                    updateData[dbKey] = ''; // Limpa o campo se a opção for excluída
                                    needsUpdate = true;
                                }
                            });

                            if (needsUpdate) {
                                const ref = db.collection(COLLECTION_NAME).doc(vehicle.firestoreId);
                                batch.update(ref, updateData);
                                count++;
                                
                                // O limite do Firebase Batch é 500 operações. Commitamos se chegar perto.
                                if (count >= 490) {
                                    batch.commit();
                                    batch = db.batch();
                                    count = 0;
                                }
                            }
                        });

                        // Commita os batches restantes
                        if (count > 0) {
                            await batch.commit();
                        }
                    }

                    setIsSettingsOpen(false);
                } catch (e) {
                    alert("Erro ao salvar configurações: " + e.message);
                }
            };

            // Filtragem e Interatividade
            const handleEditClick = (vehicle) => setEditingVehicle(vehicle);
            const handleSellClick = (vehicle) => setSellingVehicle(vehicle);
            
            // ALTERAÇÃO 2: Toggle para Múltipla Seleção (Status e Situação)
            const handleChartClick = (type, value) => {
                if (type === 'status' || type === 'situacao' || type === 'banco') {
                    setFilters(prev => {
                        const list = prev[type] || [];
                        const newList = list.includes(value)
                            ? list.filter(item => item !== value)
                            : [...list, value];
                        
                        return { ...prev, [type]: newList };
                    });
                } else {
                    // Para outros filtros
                    setFilters(prev => ({ ...prev, [type]: prev[type] === value ? '' : value }));
                }
            };

            const handleYearClick = (year) => setFilters(prev => ({ ...prev, ano: prev.ano === year ? '' : year }));
            const clearFilters = () => { setFilters({ status: [], situacao: [], banco: [], category: '', ano: '' }); setSearchTerm(''); };
            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const filteredData = useMemo(() => {
                let data = fleetData.filter(item => !item[keys.IS_SOLD]);
                
                // ALTERAÇÃO 3: Filtro com includes (Status)
                if (filters.status.length > 0) {
                    data = data.filter(item => filters.status.includes(item[keys.STATUS]));
                }

                // ALTERAÇÃO 3: Filtro com includes (Situação)
                if (filters.situacao.length > 0) {
                    data = data.filter(item => {
                        const rawSit = item[keys.SITUACAO] || '';
                        let sitToCheck = rawSit;
                        if (normalizeText(rawSit).startsWith('A.')) sitToCheck = 'ALUGADOS'; // Mantém compatibilidade com a lógica anterior
                        // Verifica se o valor original ou o valor tratado (ALUGADOS) está na lista de filtros
                        return filters.situacao.includes(sitToCheck) || filters.situacao.includes(rawSit);
                    });
                }

                if (filters.banco.length > 0) {
                    data = data.filter(item => filters.banco.includes(item[keys.BANCO]));
                }
                
                if (filters.category) data = data.filter(item => getStatusCategory(item[keys.SITUACAO]) === filters.category);
                if (filters.ano) {
                    data = data.filter(item => {
                          let val = item[keys.ANO];
                          if (val) val = val.toString().trim();
                          if (!val || val === '') val = 'N/D';
                          return val === filters.ano;
                    });
                }
                if (searchTerm) {
                    data = data.filter(bus => Object.values(bus).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase())));
                }
                return data;
            }, [fleetData, filters, searchTerm, keys]);

            const soldData = useMemo(() => fleetData.filter(item => item[keys.IS_SOLD]), [fleetData, keys]);

            const metrics = useMemo(() => {
                const dataToUse = filteredData; 
                const total = dataToUse.length;
                const situacaoCount = {}; const statusCount = {}; const bancoCount = {}; const fornecedoraCount = {}; const chassiCount = {}; const anoCount = {};
                let operacionais = 0; let liberados = 0; let emManutencao = 0; let emReforma = 0; let vendidos = 0;
                const dynamicStatusCounts = {};

                dataToUse.forEach(bus => {
                    const sitRaw = bus[keys.SITUACAO] || '';
                    let sitDisplay = sitRaw;
                    if (normalizeText(sitRaw).startsWith('A.')) sitDisplay = 'ALUGADOS';
                    const category = getStatusCategory(sitRaw);
                    let ano = bus[keys.ANO];
                    if (ano) ano = ano.toString().trim(); if (!ano || ano === '') ano = 'N/D';

                    situacaoCount[sitDisplay] = (situacaoCount[sitDisplay] || 0) + 1;
                    anoCount[ano] = (anoCount[ano] || 0) + 1;
                    
                    const rawStatus = bus[keys.STATUS] || 'Outros';
                    const statusLabel = STATUS_MAP[rawStatus] || rawStatus;
                    statusCount[statusLabel] = (statusCount[statusLabel] || 0) + 1;
                    
                    const codeStatus = bus[keys.STATUS] || 'N/D';
                    dynamicStatusCounts[codeStatus] = (dynamicStatusCounts[codeStatus] || 0) + 1;

                    const banco = bus[keys.BANCO] || 'Outros'; bancoCount[banco] = (bancoCount[banco] || 0) + 1;
                    const forn = bus[keys.FORNECEDORA] || 'Outros'; fornecedoraCount[forn] = (fornecedoraCount[forn] || 0) + 1;
                    const chassi = bus[keys.CHASSI] || 'Outros'; chassiCount[chassi] = (chassiCount[chassi] || 0) + 1;

                    if (category === 'OPERACAO') operacionais++;
                    else if (category === 'REFORMA') emReforma++;
                    else if (category === 'MANUTENCAO') emManutencao++;
                    else if (category === 'LIBERADO') liberados++;
                    else if (category === 'VENDIDO') vendidos++;
                });

                const formatForChart = (obj) => Object.entries(obj).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
                const formatYears = (obj) => Object.entries(obj).map(([name, value]) => ({ name, value })).sort((a, b) => {
                        const yearA = parseInt(a.name) || 0; const yearB = parseInt(b.name) || 0;
                        if (yearA > 0 && yearB > 0) return yearB - yearA; return b.name.localeCompare(a.name);
                    });

                return { total, operacionais, liberados, emManutencao, emReforma, vendidos, dynamicStatusCounts, situacaoChart: formatForChart(situacaoCount), statusChart: formatForChart(statusCount), bancoChart: formatForChart(bancoCount), fornecedoraChart: formatForChart(fornecedoraCount), chassiChart: formatForChart(chassiCount), anosList: formatYears(anoCount) };
            }, [filteredData, keys]); 

            const uniqueValues = useMemo(() => {
                const getUnique = (key) => [...new Set(fleetData.map(item => item[key]).filter(Boolean))];
                
                const situacoes = fleetData.map(item => {
                    const s = item[keys.SITUACAO];
                    return normalizeText(s).startsWith('A.') ? 'ALUGADOS' : s;
                }).filter(Boolean);

                return { 
                    status: [...new Set([...getUnique(keys.STATUS), ...(filterSettings.status || [])])].sort(), 
                    situacao: [...new Set([...situacoes, ...(filterSettings.situacao || [])])].sort(), 
                    banco: [...new Set([...getUnique(keys.BANCO), ...(filterSettings.banco || [])])].sort() 
                };
            }, [fleetData, keys, filterSettings]);

            const processedData = useMemo(() => {
                let data = [...filteredData]; 
                if (sortConfig.key) {
                    data.sort((a, b) => {
                        const valA = a[sortConfig.key] || ''; const valB = b[sortConfig.key] || '';
                        if (sortConfig.key === keys.ANO) { const numA = parseInt(valA) || 0; const numB = parseInt(valB) || 0; if (numA !== numB) return sortConfig.direction === 'asc' ? numA - numB : numB - numA; }
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1; if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1; return 0;
                    });
                }
                return data;
            }, [filteredData, sortConfig, keys]);

            const SortableHeader = ({ label, sortKey }) => (
                <th className="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors group select-none whitespace-nowrap" onClick={() => requestSort(sortKey)}>
                    <div className="flex items-center gap-2">{label}{sortConfig.key === sortKey ? (sortConfig.direction === 'asc' ? <ArrowUp className="w-4 h-4 text-blue-600" /> : <ArrowDown className="w-4 h-4 text-blue-600" />) : (<ArrowUpDown className="w-4 h-4 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity" />)}</div>
                </th>
            );
            
            // Calculamos quantos filtros estão ativos checando o tamanho dos arrays
            const activeFiltersCount = filters.status.length + filters.situacao.length + filters.banco.length + (filters.category ? 1 : 0) + (filters.ano ? 1 : 0) + (searchTerm ? 1 : 0);
            
            const FilterBadge = ({ label, value, onClear }) => (<span className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 border border-blue-200">{label}: {value}<button onClick={onClear} className="hover:text-blue-900"><XIcon className="w-3 h-3" /></button></span>);

            // === RENDERIZAÇÃO ===
            
            if (authLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50"><div className="animate-pulse flex flex-col items-center"><Bus className="w-12 h-12 text-slate-300 mb-4" /><p className="text-slate-500 font-medium">A carregar o sistema...</p></div></div>;

            // Se não estiver logado, mostra Login
            if (!user) {
                return <LoginScreen onLogin={handleLogin} onRegister={handleRegister} error={loginError} isLoading={authLoading} />;
            }

            // Se estiver logado, mostra Dashboard
            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-6 pb-20">
                    {firebaseError && (
                        <div className="mb-4 bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-red-800 flex items-start gap-3 shadow-sm animate-in slide-in-from-top-2">
                            <AlertTriangle className="w-5 h-5 flex-shrink-0 mt-0.5 text-red-600" />
                            <div><h4 className="font-bold mb-1">Erro de Banco de Dados</h4><p>{firebaseError}</p></div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-900">Gestão de Frota</h1>
                            <div className="flex items-center gap-2 text-slate-500 mt-1">
                                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                <span className="text-sm font-medium">{user.email}</span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                            {view === 'dashboard' && <button onClick={() => setView('list')} className="w-full md:w-auto flex items-center justify-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors shadow-sm font-medium text-sm"><ListIcon className="w-4 h-4" /> Ver Tabela</button>}
                            {(view === 'list' || view === 'sold_list') && <button onClick={() => setView('dashboard')} className="w-full md:w-auto flex items-center justify-center gap-2 px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 transition-colors shadow-sm font-medium text-sm"><ArrowLeft className="w-4 h-4" /> Voltar</button>}
                            
                            <button onClick={handleLogout} className="w-full md:w-auto flex items-center justify-center gap-2 px-4 py-2 bg-white text-slate-600 border border-slate-200 rounded-lg hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors shadow-sm font-medium text-sm" title="Sair do sistema">
                                <LogOut className="w-4 h-4" /> Sair
                            </button>
                        </div>
                    </div>
                    
                    {(activeFiltersCount > 0 || searchTerm) && view !== 'sold_list' && (
                        <div className="mb-6 flex flex-wrap items-center gap-2 bg-white p-3 rounded-lg border border-slate-200 shadow-sm animate-in fade-in slide-in-from-top-2">
                            <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider flex items-center gap-1"><FilterIcon className="w-3 h-3" /> Filtros:</span>
                            
                            {/* ALTERAÇÃO 4: Renderizar múltiplos badges */}
                            {filters.status.map(s => <FilterBadge key={s} label="Status" value={STATUS_MAP[s] || s} onClear={() => handleChartClick('status', s)} />)}
                            {filters.situacao.map(s => <FilterBadge key={s} label="Situação" value={s} onClear={() => handleChartClick('situacao', s)} />)}
                            {filters.banco.map(b => <FilterBadge key={b} label="Banco" value={b} onClear={() => handleChartClick('banco', b)} />)}
                            
                            {filters.category && <FilterBadge label="Categoria" value={filters.category} onClear={() => setFilters({...filters, category: ''})} />}
                            {filters.ano && <FilterBadge label="Ano" value={filters.ano} onClear={() => setFilters({...filters, ano: ''})} />}
                            {searchTerm && <FilterBadge label="Busca" value={searchTerm} onClear={() => setSearchTerm('')} />}
                            <button onClick={clearFilters} className="ml-auto text-xs text-red-500 hover:text-red-700 underline font-medium">Limpar Todos</button>
                        </div>
                    )}

                    {view === 'dashboard' && (
                        <div className="animate-in fade-in duration-500">
                            <div className="mb-6"><Card title="Total de Veículos" value={metrics.total} icon={Bus} color="blue" subtext="Limpar filtros" featured={true} clickable={true} onClick={clearFilters} /></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6 mb-8">
                                {Object.entries(metrics.dynamicStatusCounts)
                                    .sort((a, b) => {
                                        const order = ['P', 'A', 'ETBL', 'R', 'RTP'];
                                        const idxA = order.indexOf(a[0]);
                                        const idxB = order.indexOf(b[0]);
                                        if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                                        if (idxA !== -1) return -1;
                                        if (idxB !== -1) return 1;
                                        return a[0].localeCompare(b[0]);
                                    })
                                    .map(([statusCode, count]) => {
                                        let icon = Bus;
                                        let color = "slate";
                                        if (statusCode === 'P') { icon = MapPin; color = "purple"; }
                                        else if (statusCode === 'A') { icon = CreditCard; color = "emerald"; }
                                        else if (statusCode === 'ETBL') { icon = Bus; color = "amber"; }
                                        else if (statusCode === 'R') { icon = MapPin; color = "red"; }
                                        else if (statusCode === 'RTP') { icon = Bus; color = "blue"; }

                                        const title = STATUS_MAP[statusCode] ? `${STATUS_MAP[statusCode]} (${statusCode})` : statusCode;
                                        const subtext = `Veículos ${STATUS_MAP[statusCode] || statusCode}`;

                                        return (
                                            <Card 
                                                key={statusCode} 
                                                title={title} 
                                                value={count} 
                                                icon={icon} 
                                                color={color} 
                                                subtext={subtext} 
                                                clickable={true} 
                                                onClick={() => handleChartClick('status', statusCode)} 
                                            />
                                        );
                                    })}
                            </div>
                            <div className="mb-8"><h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 ml-1 flex items-center gap-2"><Calendar className="w-4 h-4" /> Frota por Ano</h3>{metrics.anosList.length > 0 ? (<div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">{metrics.anosList.map((item) => (<Card key={item.name} title={`Ano ${item.name}`} value={item.value} icon={Calendar} color={item.name === 'N/D' ? 'red' : 'slate'} compact={true} clickable={true} onClick={() => handleYearClick(item.name)} />))}</div>) : (<div className="p-4 bg-yellow-50 text-yellow-700 rounded-lg flex items-center gap-2"><AlertCircle className="w-5 h-5" /> Nenhum dado de ano disponível.</div>)}</div>
                            
                            {/* --- GRÁFICOS RESPONSIVOS MELHORADOS --- */}
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                {/* Gráfico 1: Situação (Pizza) */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col min-w-0">
                                    <h3 className="text-lg font-semibold mb-4">Situação Operacional</h3>
                                    <div className="h-72 md:h-80 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie 
                                                    data={metrics.situacaoChart} 
                                                    cx="50%" 
                                                    cy="50%" 
                                                    labelLine={false} 
                                                    label={({ value, percent }) => `${value} (${(percent * 100).toFixed(0)}%)`} 
                                                    outerRadius="75%" 
                                                    fill="#8884d8" 
                                                    dataKey="value" 
                                                    onClick={(data) => handleChartClick('situacao', data.name)}
                                                    paddingAngle={2}
                                                >
                                                    {metrics.situacaoChart.map((entry, index) => <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />)}
                                                </Pie>
                                                <Tooltip contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                                                <Legend verticalAlign="bottom" height={36} iconType="circle" />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Gráfico 2: Banco (Barras Verticais) */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col min-w-0">
                                    <h3 className="text-lg font-semibold mb-4">Distribuição por Banco</h3>
                                    <div className="h-80 md:h-96 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={metrics.bancoChart} layout="vertical" margin={{ top: 5, right: 30, left: 0, bottom: 5 }}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#e2e8f0" />
                                                <XAxis type="number" hide />
                                                <YAxis dataKey="name" type="category" width={90} tick={{fontSize: 11, fill: '#64748b'}} />
                                                <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                                                <Bar dataKey="value" fill="#8884d8" radius={[0, 4, 4, 0]} onClick={(data) => handleChartClick('banco', data.name)} barSize={24}>
                                                    <LabelList dataKey="value" position="right" style={{ fill: '#64748b', fontSize: '12px', fontWeight: 'bold' }} />
                                                    {metrics.bancoChart.map((entry, index) => <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />)}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                                {/* Gráfico 3: Modelos (Barras) */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col min-w-0">
                                    <h3 className="text-lg font-semibold mb-4">Modelos de Chassi</h3>
                                    <div className="h-72 md:h-80 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={metrics.chassiChart} margin={{ top: 20, right: 20, left: 10, bottom: 20 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                <XAxis dataKey="name" tick={{fontSize: 10, fill: '#64748b'}} interval={0} angle={-45} textAnchor="end" height={60} />
                                                <YAxis hide />
                                                <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                                                <Bar dataKey="value" fill="#00C49F" radius={[4, 4, 0, 0]} barSize={40}>
                                                    <LabelList dataKey="value" position="top" style={{ fill: '#64748b', fontSize: '12px', fontWeight: 'bold' }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Gráfico 4: Origem (Barras Verticais Longas) */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col min-w-0">
                                    <h3 className="text-lg font-semibold mb-4">Fornecedores / Origem</h3>
                                    <div className="h-96 md:h-[500px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={metrics.fornecedoraChart} layout="vertical" margin={{ top: 5, right: 30, left: 0, bottom: 5 }}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#e2e8f0" />
                                                <XAxis type="number" hide />
                                                <YAxis dataKey="name" type="category" width={130} tick={{fontSize: 11, fill: '#64748b'}} />
                                                <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                                                <Bar dataKey="value" fill="#FF8042" radius={[0, 4, 4, 0]} barSize={20}>
                                                    <LabelList dataKey="value" position="right" style={{ fill: '#64748b', fontSize: '12px', fontWeight: 'bold' }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {view === 'list' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-100 animate-in fade-in slide-in-from-bottom-4 duration-500">
                            <div className="p-5 border-b border-slate-100 rounded-t-xl">
                                <div className="flex flex-col xl:flex-row xl:items-center justify-between gap-4">
                                    <h3 className="text-lg font-semibold text-slate-800">Detalhamento da Frota</h3>
                                    <div className="flex flex-col md:flex-row flex-wrap items-center gap-3">
                                        <div className="relative w-full md:w-auto md:flex-1 min-w-[200px]"><Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 w-4 h-4" /><input type="text" placeholder="Buscar..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                                        <div className="flex items-center gap-2 w-full md:w-auto relative z-20">
                                            {/* ALTERAÇÃO 5: Novo Componente MultiSelectDropdown */}
                                            <MultiSelectDropdown 
                                                label="Status" 
                                                options={uniqueValues.status} 
                                                selectedValues={filters.status} 
                                                onChange={(val) => handleChartClick('status', val)}
                                                mapLabel={(val) => STATUS_MAP[val] || val}
                                            />

                                            <MultiSelectDropdown 
                                                label="Situação" 
                                                options={uniqueValues.situacao} 
                                                selectedValues={filters.situacao} 
                                                onChange={(val) => handleChartClick('situacao', val)}
                                            />

                                            <MultiSelectDropdown 
                                                label="Banco" 
                                                options={uniqueValues.banco} 
                                                selectedValues={filters.banco} 
                                                onChange={(val) => handleChartClick('banco', val)}
                                            />
                                        </div>
                                        <div className="flex gap-2 w-full md:w-auto mt-3 md:mt-0">
                                            <button onClick={() => setIsSettingsOpen(true)} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-slate-100 text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-200 transition-colors text-sm font-medium whitespace-nowrap"><SettingsIcon className="w-4 h-4" /> <span className="hidden sm:inline">Opções</span></button>
                                            <button onClick={() => setView('sold_list')} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 transition-colors text-sm font-medium whitespace-nowrap"><DollarSign className="w-4 h-4" /> Vendidos</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="overflow-x-auto rounded-b-xl">
                                <table className="w-full text-left text-sm text-slate-600">
                                    <thead className="bg-slate-50 text-slate-700 font-semibold uppercase text-xs">
                                        <tr><SortableHeader label="Prefixo" sortKey={keys.PREFIXO} /><SortableHeader label="Novo Prefixo" sortKey={keys.NOVO_PREFIXO} /><SortableHeader label="Placa" sortKey={keys.PLACA} /><SortableHeader label="Renavam" sortKey={keys.RENAVAM} /><SortableHeader label="Ano" sortKey={keys.ANO} /><SortableHeader label="Status" sortKey={keys.STATUS} /><SortableHeader label="Situação" sortKey={keys.SITUACAO} /><SortableHeader label="Banco" sortKey={keys.BANCO} /><SortableHeader label="Modelo" sortKey={keys.MODELO} /><th className="px-6 py-4">Ações</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {processedData.length > 0 ? (processedData.map((bus, idx) => {
                                                const cat = getStatusCategory(bus[keys.SITUACAO]);
                                                return (
                                                    <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-6 py-4 font-medium text-slate-900">{bus[keys.PREFIXO]}</td>
                                                        <td className="px-6 py-4 text-blue-600 font-bold">{bus[keys.NOVO_PREFIXO] ? <span className="flex items-center gap-1">{bus[keys.NOVO_PREFIXO]}<TypeIcon className="w-3 h-3 text-blue-400" /></span> : <span className="text-slate-300"></span>}</td>
                                                        <td className="px-6 py-4">{bus[keys.PLACA]}</td><td className="px-6 py-4 font-mono text-xs">{bus[keys.RENAVAM]}</td><td className="px-6 py-4 font-medium text-slate-700">{bus[keys.ANO]}</td>
                                                        <td className="px-6 py-4"><span className={`px-2 py-1 rounded-full text-xs font-medium ${bus[keys.STATUS] === 'RTP' ? 'bg-blue-100 text-blue-700' : bus[keys.STATUS] === 'ETBL' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-700'}`}>{STATUS_MAP[bus[keys.STATUS]] || bus[keys.STATUS]}</span></td>
                                                        <td className="px-6 py-4"><span className={`flex items-center gap-2 ${cat === 'OPERACAO' ? 'text-emerald-600 font-medium' : cat === 'MANUTENCAO' ? 'text-amber-600 font-medium' : cat === 'REFORMA' ? 'text-red-600 font-medium' : cat === 'VENDIDO' ? 'text-purple-600 font-medium' : 'text-slate-600'}`}>{cat === 'REFORMA' && <Hammer className="w-3 h-3" />}{cat === 'MANUTENCAO' && <Wrench className="w-3 h-3" />}{cat === 'OPERACAO' && <Activity className="w-3 h-3" />}{cat === 'VENDIDO' && <DollarSign className="w-3 h-3" />}{bus[keys.SITUACAO]}</span></td>
                                                        <td className="px-6 py-4">{bus[keys.BANCO]}</td><td className="px-6 py-4">{bus[keys.MODELO]} ({bus[keys.CHASSI]})</td>
                                                        <td className="px-6 py-4 flex gap-2"><button onClick={() => handleEditClick(bus)} className="text-slate-400 hover:text-blue-600 transition-colors p-1 rounded-full hover:bg-blue-50" title="Editar"><Edit className="w-4 h-4" /></button><button onClick={() => handleSellClick(bus)} className="text-slate-400 hover:text-emerald-600 transition-colors p-1 rounded-full hover:bg-emerald-50" title="Vender Veículo"><DollarSign className="w-4 h-4" /></button></td>
                                                    </tr>
                                                );
                                            })) : (<tr><td colSpan="10" className="px-6 py-8 text-center text-slate-400">Nenhum veículo encontrado.</td></tr>)}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {view === 'sold_list' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden animate-in fade-in slide-in-from-right duration-500">
                             <div className="p-6 border-b border-slate-100">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-3"><div className="bg-emerald-100 p-2 rounded-lg"><ShoppingCart className="w-6 h-6 text-emerald-700" /></div><div><h3 className="text-xl font-bold text-slate-800">Veículos Vendidos</h3><p className="text-sm text-slate-500">Histórico e Controlo de Pagamentos</p></div></div>
                                    
                                    <div className="flex flex-wrap gap-4">
                                        <div className="bg-emerald-50 px-4 py-2 rounded-lg border border-emerald-100 text-right"><p className="text-xs text-emerald-600 font-semibold uppercase">Total Vendas</p><p className="text-xl font-bold text-emerald-800">{formatCurrency(soldData.reduce((acc, curr) => acc + (curr[keys.PRICE] || 0), 0))}</p></div>
                                        <div className="bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 text-right"><p className="text-xs text-blue-600 font-semibold uppercase">Total Recebido</p><p className="text-xl font-bold text-blue-800">{formatCurrency(soldData.reduce((acc, curr) => acc + (curr[keys.RECEIVED_AMOUNT] || 0), 0))}</p></div>
                                        <div className="bg-amber-50 px-4 py-2 rounded-lg border border-amber-100 text-right"><p className="text-xs text-amber-600 font-semibold uppercase">Total A Receber</p><p className="text-xl font-bold text-amber-800">{formatCurrency(soldData.reduce((acc, curr) => acc + ((curr[keys.PRICE] || 0) - (curr[keys.RECEIVED_AMOUNT] || 0)), 0))}</p></div>
                                    </div>
                                </div>
                             </div>
                             <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm text-slate-600">
                                    <thead className="bg-slate-50 text-slate-700 font-semibold uppercase text-xs">
                                        <tr>
                                            <th className="px-6 py-4">Data Venda</th>
                                            <th className="px-6 py-4">Prefixo / Placa</th>
                                            <th className="px-6 py-4">Comprador</th>
                                            <th className="px-6 py-4 text-right">Valor Venda</th>
                                            <th className="px-6 py-4 text-right text-emerald-600">Valor Recebido</th>
                                            <th className="px-6 py-4 text-right text-amber-600">A Receber</th>
                                            <th className="px-6 py-4 text-center">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {soldData.length > 0 ? (soldData.map((bus, idx) => {
                                                const preco = bus[keys.PRICE] || 0;
                                                const recebido = bus[keys.RECEIVED_AMOUNT] || 0;
                                                const aReceber = preco - recebido;
                                                return (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-6 py-4 text-slate-500">{bus[keys.SALE_DATE] || '-'}</td>
                                                    <td className="px-6 py-4 font-medium text-slate-900">{bus[keys.PREFIXO]} <span className="text-slate-400 font-normal ml-1">({bus[keys.PLACA]})</span></td>
                                                    <td className="px-6 py-4 font-medium text-slate-700">{bus[keys.BUYER]}</td>
                                                    <td className="px-6 py-4 text-right font-bold text-slate-800">{formatCurrency(preco)}</td>
                                                    <td className="px-6 py-4 text-right font-medium text-emerald-600">{formatCurrency(recebido)}</td>
                                                    <td className="px-6 py-4 text-right font-bold text-amber-600">{formatCurrency(aReceber)}</td>
                                                    <td className="px-6 py-4 flex gap-2 justify-center">
                                                        <button onClick={() => setUpdatingPayment(bus)} className="text-blue-500 hover:text-blue-700 transition-colors p-1.5 rounded-full hover:bg-blue-50" title="Atualizar Pagamento"><Wallet className="w-4 h-4" /></button>
                                                        <button onClick={() => handleCancelSale(bus)} className="text-red-400 hover:text-red-600 transition-colors p-1.5 rounded-full hover:bg-red-50" title="Cancelar Venda"><RotateCcw className="w-4 h-4" /></button>
                                                    </td>
                                                </tr>
                                            )})) : (<tr><td colSpan="7" className="px-6 py-12 text-center text-slate-400"><ShoppingCart className="w-12 h-12 mx-auto mb-3 text-slate-200" /><p>Nenhum veículo vendido registado ainda.</p></td></tr>)}
                                    </tbody>
                                </table>
                             </div>
                        </div>
                    )}
                    
                    {editingVehicle && <EditModal bus={editingVehicle} currentSituacao={editingVehicle[keys.SITUACAO]} currentStatus={editingVehicle[keys.STATUS]} currentNovoPrefixo={editingVehicle[keys.NOVO_PREFIXO]} currentBanco={editingVehicle[keys.BANCO]} onClose={() => setEditingVehicle(null)} onSave={handleSaveEdit} situacaoOptions={uniqueValues.situacao} statusOptions={uniqueValues.status} bancoOptions={uniqueValues.banco} />}
                    {sellingVehicle && <SalesModal bus={sellingVehicle} onClose={() => setSellingVehicle(null)} onConfirm={handleConfirmSale} />}
                    {updatingPayment && <PaymentModal bus={updatingPayment} keys={keys} onClose={() => setUpdatingPayment(null)} onConfirm={handleUpdatePayment} />}
                    {isSettingsOpen && <SettingsModal initialOptions={uniqueValues} onClose={() => setIsSettingsOpen(false)} onSave={handleSaveSettings} />}

                    <div className="mt-8 flex flex-col items-center justify-center gap-2 text-xs text-slate-400">Dashboard de Frota • Firebase Secured</div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
